<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0D1B2A"/>
  <defs>
    <linearGradient id="sky" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B1464"/>
      <stop offset="50%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B1464" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- 45-degree diagonal line -->
  <line x1="0" y1="630" x2="1200" y2="0" stroke="rgba(255,217,125,0.15)" stroke-width="2"/>
  <!-- stars -->
  <circle cx="100" cy="80" r="2" fill="#FFD97D" opacity="0.8"/>
  <circle cx="300" cy="50" r="1.5" fill="#FFD97D" opacity="0.6"/>
  <circle cx="500" cy="120" r="2.5" fill="#FFD97D" opacity="0.7"/>
  <circle cx="800" cy="60" r="2" fill="#FFD97D" opacity="0.5"/>
  <circle cx="1050" cy="100" r="1.5" fill="#FFD97D" opacity="0.9"/>
  <circle cx="150" cy="200" r="1" fill="#FFD97D" opacity="0.4"/>
  <circle cx="950" cy="180" r="1.5" fill="#FFD97D" opacity="0.6"/>
  <circle cx="700" cy="30" r="2" fill="#C5B4E3" opacity="0.5"/>
  <circle cx="400" cy="500" r="1.5" fill="#95D5B2" opacity="0.4"/>
  <circle cx="1100" cy="400" r="2" fill="#F4A261" opacity="0.3"/>
  <!-- compass -->
  <circle cx="600" cy="220" r="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="600" y1="220" x2="670" y2="150" stroke="#FFD97D" stroke-width="5" stroke-linecap="round"/>
  <circle cx="600" cy="220" r="8" fill="#FFD97D"/>
  <text x="678" y="145" fill="rgba(255,255,255,0.5)" font-size="20" font-family="sans-serif">NE</text>
  <!-- title -->
  <text x="600" y="380" text-anchor="middle" fill="#F8F4E8" font-size="72" font-weight="900" font-family="'Noto Sans KR',sans-serif">꿈 꾸는 45°</text>
  <text x="600" y="430" text-anchor="middle" fill="rgba(255,217,125,0.9)" font-size="28" font-family="sans-serif" letter-spacing="6">DREAMING 45°</text>
  <!-- tagline -->
  <text x="600" y="490" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="20" font-family="'Noto Sans KR',sans-serif">고개를 45도 들어 하늘을 바라보는 순간, 꿈은 시작된다</text>
  <!-- language badges -->
  <text x="380" y="560" fill="rgba(255,255,255,0.4)" font-size="16" font-family="sans-serif">한국어</text>
  <text x="500" y="560" fill="rgba(255,255,255,0.4)" font-size="16" font-family="sans-serif">English</text>
  <text x="620" y="560" fill="rgba(255,255,255,0.4)" font-size="16" font-family="sans-serif">中文</text>
  <text x="720" y="560" fill="rgba(255,255,255,0.4)" font-size="16" font-family="sans-serif">हिन्दी</text>
  <!-- dots between languages -->
  <circle cx="470" cy="556" r="2" fill="rgba(255,217,125,0.4)"/>
  <circle cx="590" cy="556" r="2" fill="rgba(255,217,125,0.4)"/>
  <circle cx="695" cy="556" r="2" fill="rgba(255,217,125,0.4)"/>
</svg>
